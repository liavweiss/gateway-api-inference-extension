bbr:
  name: body-based-router
  replicas: 1
  image:
    name: bbr
    hub: us-central1-docker.pkg.dev/k8s-staging-images/gateway-api-inference-extension
    tag: main
    pullPolicy: Always
  port: 9004
  healthCheckPort: 9005
  multiNamespace: false

  flags:
    # Log verbosity
    v: 3

  # Plugin configuration (transitional - currently runs no-op default plugin)
  plugins:
    - type: no-op-plugin
      name: no-op-plugin

  # Request guardrails run before plugins; if any blocks, BBR returns 403.
  # Example: NeMo Guardrails (requires NeMo service deployed and baseURL reachable from BBR pod).
  # requestGuardrails:
  #   - type: nemo-guardrails
  #     name: default
  #     json:
  #       baseURL: "http://nemo-guardrails.nemo-guardrails.svc:8000"
  #       config_id: "config"
  #       timeout_seconds: 10
  requestGuardrails: []

provider:
  name: none

inferenceGateway:
  name: inference-gateway
